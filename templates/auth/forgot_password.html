{% extends 'base.html' %}
{% block title %}Forgot Password - AI Character App{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-particles" id="authParticles"></div>
    
    <div class="auth-container">
        <div class="auth-logo">
            <div class="logo-icon-large">Ⓐ</div>
            <h1>AI Character</h1>
        </div>
        
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-icon-big"><i class="fas fa-key"></i></div>
                <h2>Forgot Password?</h2>
                <p>Enter your email and we'll send you a reset link</p>
            </div>
            
            <form method="POST" class="auth-form">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" name="email" placeholder="your@email.com" required>
                </div>
                <button type="submit" class="btn-auth">
                    <i class="fas fa-paper-plane"></i> Send Reset Link
                </button>
            </form>
            
            <div class="auth-footer-text">
                <a href="{{ url_for('auth.login') }}">← Back to Login</a>
            </div>
        </div>
    </div>
</div>

{% include 'auth/_auth_styles.html' %}
{% endblock %}
