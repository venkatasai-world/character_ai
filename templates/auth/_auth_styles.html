<style>
/* Auth Page Styles - Shared across auth templates */
.auth-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    background: var(--gradient-dark);
    padding: 20px;
}

.auth-particles {
    position: absolute;
    inset: 0;
    overflow: hidden;
}

.auth-container {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 440px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
}

.auth-logo {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

.logo-icon-large {
    width: 60px;
    height: 60px;
    background: var(--gradient-main);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-family: 'Orbitron', sans-serif;
    color: white;
    box-shadow: 0 10px 40px rgba(124, 58, 237, 0.5);
}

.auth-logo h1 {
    font-size: 22px;
    font-weight: 800;
    background: var(--gradient-main);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.auth-card {
    width: 100%;
    background: rgba(10, 10, 35, 0.85);
    backdrop-filter: blur(30px);
    border: 1px solid rgba(124, 58, 237, 0.25);
    border-radius: 24px;
    padding: 36px;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.05) inset;
}

.auth-header {
    text-align: center;
    margin-bottom: 30px;
}

.auth-icon-big {
    width: 60px;
    height: 60px;
    background: rgba(124, 58, 237, 0.15);
    border: 1px solid rgba(124, 58, 237, 0.3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: var(--primary-light);
    margin: 0 auto 16px;
}

.auth-header h2 {
    font-size: 24px;
    font-weight: 800;
    color: white;
    margin-bottom: 6px;
}

.auth-header p {
    color: var(--text-muted);
    font-size: 14px;
}

.auth-form {
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.form-group label {
    font-size: 13px;
    font-weight: 600;
    color: var(--primary-light);
    display: flex;
    align-items: center;
    gap: 6px;
}

.form-group input,
.form-group textarea,
.form-group select {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text-primary);
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    width: 100%;
    transition: all 0.3s;
    outline: none;
}

.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
    background: rgba(124, 58, 237, 0.05);
}

.form-group input::placeholder { color: rgba(255,255,255,0.2); }

.input-with-toggle {
    position: relative;
}

.input-with-toggle input {
    padding-right: 50px;
}

.toggle-pass {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 15px;
    padding: 4px;
    transition: color 0.2s;
}

.toggle-pass:hover { color: var(--primary-light); }

.form-options {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
}

.checkbox-label {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-muted);
    cursor: pointer;
}

.checkbox-label input[type="checkbox"] {
    accent-color: var(--primary);
    width: auto;
}

.forgot-link {
    color: var(--primary-light);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.2s;
}

.forgot-link:hover { color: white; }

.btn-auth {
    padding: 15px;
    background: var(--gradient-main);
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 8px 25px rgba(124, 58, 237, 0.4);
    transition: all 0.3s;
    margin-top: 4px;
}

.btn-auth:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 35px rgba(124, 58, 237, 0.6);
}

.btn-auth:active { transform: translateY(0); }

.auth-footer-text {
    text-align: center;
    font-size: 14px;
    color: var(--text-muted);
    margin-top: 20px;
}

.auth-footer-text a {
    color: var(--primary-light);
    text-decoration: none;
    font-weight: 600;
    margin-left: 4px;
    transition: color 0.2s;
}

.auth-footer-text a:hover { color: white; }
</style>

<script>
function togglePassword(id) {
    const input = document.getElementById(id);
    const icon = document.getElementById(id + 'Icon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
    }
}

// Generate particles for auth page
(function() {
    const container = document.getElementById('authParticles');
    if (!container) return;
    for(let i = 0; i < 50; i++) {
        const star = document.createElement('div');
        star.style.cssText = `
            position: absolute;
            left: ${Math.random() * 100}%;
            top: ${Math.random() * 100}%;
            width: ${Math.random() * 2 + 1}px;
            height: ${Math.random() * 2 + 1}px;
            background: white;
            border-radius: 50%;
            opacity: ${Math.random() * 0.4 + 0.1};
            animation: twinkle ${Math.random() * 4 + 2}s ease-in-out infinite;
            animation-delay: ${Math.random() * 3}s;
        `;
        container.appendChild(star);
    }
})();
</script>
