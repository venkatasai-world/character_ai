{% extends 'base.html' %}
{% block title %}Reset Password - AI Character App{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-particles" id="authParticles"></div>
    
    <div class="auth-container">
        <div class="auth-logo">
            <div class="logo-icon-large">Ⓐ</div>
            <h1>AI Character</h1>
        </div>
        
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-icon-big"><i class="fas fa-shield-halved"></i></div>
                <h2>Set New Password</h2>
                <p>Choose a strong password for your account</p>
            </div>
            
            <form method="POST" class="auth-form">
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> New Password</label>
                    <div class="input-with-toggle">
                        <input type="password" name="password" id="newPass" placeholder="Min. 6 characters" required>
                        <button type="button" class="toggle-pass" onclick="togglePassword('newPass')">
                            <i class="fas fa-eye" id="newPassIcon"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Confirm New Password</label>
                    <div class="input-with-toggle">
                        <input type="password" name="confirm_password" id="confNewPass" placeholder="Repeat password" required>
                        <button type="button" class="toggle-pass" onclick="togglePassword('confNewPass')">
                            <i class="fas fa-eye" id="confNewPassIcon"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-auth">
                    <i class="fas fa-check"></i> Reset Password
                </button>
            </form>
        </div>
    </div>
</div>

{% include 'auth/_auth_styles.html' %}
{% endblock %}
