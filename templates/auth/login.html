{% extends 'base.html' %}
{% block title %}Login - AI Character App{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-particles" id="authParticles"></div>
    
    <div class="auth-container">
        <div class="auth-logo">
            <div class="logo-icon-large">Ⓐ</div>
            <h1>AI Character</h1>
        </div>
        
        <div class="auth-card">
            <div class="auth-header">
                <h2>Welcome Back 👋</h2>
                <p>Sign in to your account to continue</p>
            </div>
            
            <form method="POST" class="auth-form">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" name="email" placeholder="your@email.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <div class="input-with-toggle">
                        <input type="password" name="password" id="loginPassword" placeholder="••••••••" required>
                        <button type="button" class="toggle-pass" onclick="togglePassword('loginPassword')">
                            <i class="fas fa-eye" id="loginPasswordIcon"></i>
                        </button>
                    </div>
                </div>
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="{{ url_for('auth.forgot_password') }}" class="forgot-link">Forgot password?</a>
                </div>
                <button type="submit" class="btn-auth">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>
            
            <div class="auth-footer-text">
                Don't have an account? 
                <a href="{{ url_for('auth.register') }}">Create one →</a>
            </div>
        </div>
    </div>
</div>

{% include 'auth/_auth_styles.html' %}
{% endblock %}
