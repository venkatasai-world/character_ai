{% extends 'base.html' %}
{% block title %}Register - AI Character App{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-particles" id="authParticles"></div>
    
    <div class="auth-container">
        <div class="auth-logo">
            <div class="logo-icon-large">Ⓐ</div>
            <h1>AI Character</h1>
        </div>
        
        <div class="auth-card">
            <div class="auth-header">
                <h2>Create Account ✨</h2>
                <p>Join and start creating AI characters</p>
            </div>
            
            <form method="POST" class="auth-form">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" name="name" placeholder="Your name" required autocomplete="name">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" name="email" placeholder="your@email.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <div class="input-with-toggle">
                        <input type="password" name="password" id="regPassword" placeholder="Min. 6 characters" required>
                        <button type="button" class="toggle-pass" onclick="togglePassword('regPassword')">
                            <i class="fas fa-eye" id="regPasswordIcon"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Confirm Password</label>
                    <div class="input-with-toggle">
                        <input type="password" name="confirm_password" id="confPassword" placeholder="Repeat password" required>
                        <button type="button" class="toggle-pass" onclick="togglePassword('confPassword')">
                            <i class="fas fa-eye" id="confPasswordIcon"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-auth">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>
            
            <div class="auth-footer-text">
                Already have an account? 
                <a href="{{ url_for('auth.login') }}">Sign in →</a>
            </div>
        </div>
    </div>
</div>

{% include 'auth/_auth_styles.html' %}
{% endblock %}
