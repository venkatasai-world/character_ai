<style>
.create-char-page { min-height:100vh; background: var(--gradient-dark); display:flex; align-items:flex-start; justify-content:center; padding:40px 20px; position:relative; overflow:hidden; }
.create-particles { position:fixed; inset:0; overflow:hidden; pointer-events:none; z-index:0; }
.create-container { position:relative; z-index:2; width:100%; max-width:900px; }
.create-header { display:flex; align-items:center; gap:16px; margin-bottom:24px; }
.back-btn { width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; color:var(--text-muted); text-decoration:none; transition:all .2s; }
.back-btn:hover { background:rgba(124,58,237,0.15); color:var(--primary-light); }
.create-header h1 { font-size:26px; font-weight:800; background:var(--gradient-main); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.create-header p { font-size:14px; color:var(--text-muted); }
.create-card { background:rgba(10,10,35,0.85); backdrop-filter:blur(30px); border:1px solid rgba(124,58,237,0.2); border-radius:24px; padding:36px; }
.create-form-layout { display:grid; grid-template-columns:1fr 280px; gap:40px; margin-bottom:30px; }
.form-left,.form-right { display:flex; flex-direction:column; gap:20px; }
.form-group { display:flex; flex-direction:column; gap:8px; }
.form-group label { font-size:13px; font-weight:600; color:var(--primary-light); display:flex; align-items:center; gap:6px; }
.form-group input,.form-group textarea,.form-group select { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:12px 16px; color:var(--text-primary); font-size:14px; font-family:'Inter',sans-serif; outline:none; transition:all .3s; width:100%; }
.form-group input:focus,.form-group textarea:focus,.form-group select:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(124,58,237,0.15); }
.form-group select option { background:#0d0d2b; }
.form-group textarea { resize:vertical; min-height:90px; }
.color-picker { width:46px; height:38px; border-radius:8px; padding:2px; cursor:pointer; }
.avatar-upload-label { font-size:13px; font-weight:600; color:var(--primary-light); }
.avatar-upload-area { border:2px dashed rgba(124,58,237,0.4); border-radius:16px; padding:20px; display:flex; flex-direction:column; align-items:center; gap:10px; cursor:pointer; transition:all .3s; background:rgba(124,58,237,0.05); min-height:160px; justify-content:center; }
.avatar-upload-area:hover { border-color:var(--primary); background:rgba(124,58,237,0.1); }
.avatar-preview { width:80px; height:80px; border-radius:50%; background:var(--gradient-main); display:flex; align-items:center; justify-content:center; overflow:hidden; }
.avatar-upload-text p { color:var(--primary-light); font-size:13px; font-weight:600; margin:0; }
.avatar-upload-text span { color:var(--text-muted); font-size:11px; }
.create-form-footer { display:flex; align-items:center; justify-content:flex-end; gap:12px; padding-top:20px; border-top:1px solid rgba(255,255,255,0.05); }
.btn-cancel { padding:12px 24px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:50px; color:var(--text-muted); text-decoration:none; font-weight:600; font-size:14px; transition:all .2s; }
.btn-cancel:hover { color:white; }
.btn-create-submit { padding:12px 32px; background:var(--gradient-main); border:none; border-radius:50px; color:white; font-size:15px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:8px; box-shadow:0 8px 25px rgba(124,58,237,0.4); transition:all .3s; }
.btn-create-submit:hover { transform:translateY(-2px); box-shadow:0 15px 35px rgba(124,58,237,0.6); }
</style>
<script>
function previewAvatar(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => { document.getElementById('avatarPreview').innerHTML = `<img src="${ev.target.result}" style="width:80px;height:80px;border-radius:50%;object-fit:cover">`; };
    reader.readAsDataURL(file);
}
(function() {
    const c = document.getElementById('createParticles');
    if (!c) return;
    for(let i=0;i<40;i++){const s=document.createElement('div');s.style.cssText=`position:absolute;left:${Math.random()*100}%;top:${Math.random()*100}%;width:${Math.random()*2+1}px;height:${Math.random()*2+1}px;background:white;border-radius:50%;opacity:${Math.random()*0.3+0.05};animation:twinkle ${Math.random()*4+2}s ease-in-out infinite;animation-delay:${Math.random()*3}s`;c.appendChild(s);}
})();
</script>
